<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>Vegetable Classification</title>
    <style>
        .upload-area {
            border: 2px dashed #4CAF50;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
            display: block;
        }
        .upload-area:hover { background: rgba(76,175,80,0.08); }
        .upload-area input[type="file"] { display: none; }
        .preview-img {
            max-width: 260px;
            max-height: 260px;
            border-radius: 10px;
            margin: 12px auto 0;
            display: block;
            border: 2px solid #ddd;
        }
        #predictBtn {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            font-size: 1em;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        #predictBtn:hover:not(:disabled) { background: #388e3c; }
        #predictBtn:disabled { background: #aaa; cursor: not-allowed; }
        .top3-list { list-style: none; padding: 0; margin-top: 12px; }
        .top3-list li {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: #f5f5f5;
            font-size: 0.95em;
        }
        .top3-list li:first-child { background: #e8f5e9; font-weight: bold; }
        .result-box {
            background: #e8f5e9;
            border-left: 5px solid #4CAF50;
            padding: 16px 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .result-box h3 { margin: 0 0 4px; color: #2e7d32; font-size: 1.3em; }
        .result-box p { margin: 0; color: #555; }
        .classes-info {
            margin-top: 16px;
            text-align: center;
        }
        .classes-label {
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .classes-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .classes-grid span {
            background: rgba(76,175,80,0.15);
            border: 1px solid rgba(76,175,80,0.5);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.85em;
            color: #a5d6a7;
        }
        .error-box {
            background: #ffebee;
            border-left: 5px solid #e53935;
            padding: 14px 18px;
            border-radius: 8px;
            margin-top: 20px;
            color: #c62828;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <span class="icon">🥦</span>
        <h2>Vegetable Classifier</h2>
        <p class="subtitle">Upload a vegetable image to identify it using VGG16</p>
    </div>

    <!-- label handles click natively — no JS click() needed -->
    <label class="upload-area" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*">
        <p id="uploadText">Click to upload or drag &amp; drop an image</p>
        <img id="preview" class="preview-img" style="display:none;" alt="Preview">
    </label>

    <button id="predictBtn" disabled>Classify</button>

    <div class="classes-info">
        <p class="classes-label">Supported classes</p>
        <div class="classes-grid">
            <span>🥦 Broccoli</span>
            <span>🫑 Capsicum</span>
            <span>🥕 Carrot</span>
            <span>🥬 Cauliflower</span>
            <span>🥔 Potato</span>
            <span>🌱 Radish</span>
            <span>🍅 Tomato</span>
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
    const imageInput = document.getElementById("imageInput");
    const preview    = document.getElementById("preview");
    const uploadText = document.getElementById("uploadText");
    const predictBtn = document.getElementById("predictBtn");
    const resultDiv  = document.getElementById("result");

    imageInput.addEventListener("change", function() {
        const file = this.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = "block";
            uploadText.style.display = "none";
            predictBtn.disabled = false;
            resultDiv.innerHTML = "";
        };
        reader.readAsDataURL(file);
    });

    predictBtn.addEventListener("click", async function() {
        const file = imageInput.files[0];
        if (!file) return;

        predictBtn.textContent = "Classifying...";
        predictBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch("/predict", {
                method: "POST",
                body: formData,
            });
            const data = await response.json();

            if (data.error) {
                resultDiv.innerHTML = `<div class="error-box">${data.error}</div>`;
            } else {
                const top3Html = data.top3.map(item =>
                    `<li><span>${item.class.replace(/_/g, " ")}</span><span>${item.confidence}%</span></li>`
                ).join("");

                resultDiv.innerHTML = `
                    <div class="result-box">
                        <h3>${data.predicted_class.replace(/_/g, " ")}</h3>
                        <p>Confidence: <strong>${data.confidence}%</strong></p>
                    </div>
                    <p style="margin-top:16px; font-weight:600; color:#555;">Top 3 Predictions</p>
                    <ul class="top3-list">${top3Html}</ul>
                `;
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="error-box">Request failed: ${err.message}</div>`;
        }

        predictBtn.textContent = "Classify";
        predictBtn.disabled = false;
    });

    // Drag and drop
    const uploadArea = document.getElementById("uploadArea");
    uploadArea.addEventListener("dragover",  (e) => { e.preventDefault(); uploadArea.style.background = "rgba(76,175,80,0.08)"; });
    uploadArea.addEventListener("dragleave", ()  => { uploadArea.style.background = ""; });
    uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.style.background = "";
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
            const dt = new DataTransfer();
            dt.items.add(file);
            imageInput.files = dt.files;
            imageInput.dispatchEvent(new Event("change"));
        }
    });
</script>

</body>
</html>
